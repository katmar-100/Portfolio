    <script>
      (function() {
        var saved = localStorage.getItem('theme-preference');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
        } else {
          var h = new Date().getHours();
          document.documentElement.setAttribute('data-theme', (h >= 7 && h < 19) ? 'light' : 'dark');
        }
      })();
    </script>
